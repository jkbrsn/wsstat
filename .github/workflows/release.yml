name: Manual Release
run-name: "Release ${{ inputs.prerelease && ' (prerelease)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GO_VERSION: 1.26.4
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  initialize:
    name: Initialize workflow
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: get
        run: |
          raw=$(cat VERSION)
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

  version-bump-check:
    name: "Verify correctly tagged version (${{ needs.initialize.outputs.version }})"
    needs: [initialize]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: VERSION bump check vs latest FINAL tag
        shell: bash
        run: |
          set -euo pipefail

          raw=$(cat VERSION)
          NEW_VERSION=${raw#v}  # normalized X.Y.Z

          # semver X.Y.Z with optional -prerelease/+build on the *file*, but we only accept bare X.Y.Z for base version
          if [[ ! "$NEW_VERSION" =~ ^[0-9]+(\.[0-9]+){2}([\-+][0-9A-Za-z\.-]+)?$ ]]; then
            echo "::error::VERSION (base version) must be SemVer like 0.1.2"
            exit 1
          fi

          # latest FINAL tag: strictly vX.Y.Z (ignore all prereleases)
          LATEST_FINAL_TAG=$(git tag --list 'v[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1 || true)
          LATEST_FINAL_TAG=${LATEST_FINAL_TAG:-v0.0.0}
          OLD_FINAL_VERSION=${LATEST_FINAL_TAG#v}

          echo "Latest FINAL tag: $LATEST_FINAL_TAG"
          echo "VERSION file:     $NEW_VERSION"

          # STRICT: VERSION must be > latest final, except when rerunning a
          # release whose tag was already created at this exact commit.
          if [[ "$NEW_VERSION" == "$OLD_FINAL_VERSION" ]]; then
            OLD_FINAL_COMMIT=$(git rev-list -n 1 "$LATEST_FINAL_TAG" 2>/dev/null || true)
            if [[ -n "$OLD_FINAL_COMMIT" && "$OLD_FINAL_COMMIT" == "$GITHUB_SHA" ]]; then
              echo "VERSION matches existing final tag at this commit; continuing release rerun"
            else
              echo "::error::VERSION ($NEW_VERSION) must be greater than latest final ($OLD_FINAL_VERSION)"
              exit 1
            fi
          elif [[ "$(printf '%s\n' "$OLD_FINAL_VERSION" "$NEW_VERSION" | sort -V | tail -n1)" != "$NEW_VERSION" ]]; then
            echo "::error::VERSION ($NEW_VERSION) must be greater than latest final ($OLD_FINAL_VERSION)"
            exit 1
          fi

          if [[ "$NEW_VERSION" != "$OLD_FINAL_VERSION" ]]; then
            echo "VERSION is newer than latest final: $OLD_FINAL_VERSION → $NEW_VERSION"
          fi

  go-version-align:
    name: Go version alignment
    needs: [initialize]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-go-version.sh

  test-race:
    name: Test race
    runs-on: ubuntu-24.04
    needs: [version-bump-check, go-version-align]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run race tests (1x -race -shuffle)
        shell: bash
        run: go test -mod=readonly ./... -count=1 -shuffle=on -race

  test-flaky:
    name: Test flaky
    runs-on: ubuntu-24.04
    needs: [version-bump-check, go-version-align]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run flaky tests (16x -shuffle)
        shell: bash
        run: go test -mod=readonly ./... -count=16 -shuffle=on

  golangci-lint:
    runs-on: ubuntu-24.04
    needs: [version-bump-check, go-version-align]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: -v

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    needs: [version-bump-check, go-version-align]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  release:
    name: "Build, tag & release (${{ needs.initialize.outputs.version }})"
    needs: [version-bump-check, initialize, go-version-align, test-race, test-flaky, golangci-lint, govulncheck]
    runs-on: ubuntu-24.04
    outputs:
      tag:           ${{ steps.compute_tag.outputs.tag }}
      version:       ${{ steps.compute_tag.outputs.version }}
      is_prerelease: ${{ steps.compute_tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Compute tag (final or next -rc.N)
        id: compute_tag
        shell: bash
        run: |
          set -euo pipefail

          PRERELEASE="${{ github.event.inputs.prerelease }}"
          raw=$(cat VERSION)
          VERSION="${raw#v}"  # normalized base: X.Y.Z

          tag_commit() {
            git rev-list -n 1 "$1" 2>/dev/null || true
          }

          # find next rc number (supports both -rc1 and -rc.1 historical patterns)
          next_rc_tag() {
            local base="$1"
            local maxn
            maxn=$(git tag --list "v${base}-rc*" \
              | sed -E 's/^.*-rc\.?([0-9]+)$/\1/' \
              | grep -E '^[0-9]+$' \
              | sort -n | tail -n1 || true)
            if [[ -z "${maxn:-}" ]]; then
              echo "v${base}-rc.1"
            else
              echo "v${base}-rc.$((maxn+1))"
            fi
          }

          final_commit="$(tag_commit "v${VERSION}")"
          if [[ -n "$final_commit" ]]; then
            if [[ "$PRERELEASE" == "true" ]]; then
              echo "::error::Cannot create prerelease: final tag v${VERSION} already exists"
              exit 1
            fi
            if [[ "$final_commit" != "$GITHUB_SHA" ]]; then
              echo "::error::Final tag v${VERSION} exists at $final_commit, not $GITHUB_SHA"
              exit 1
            else
              echo "Final tag v${VERSION} already exists at this commit; continuing release rerun"
            fi
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            EXISTING_HEAD_RC=$(git tag --list "v${VERSION}-rc*" \
              | while read -r tag; do
                  if [[ "$(tag_commit "$tag")" == "$GITHUB_SHA" ]]; then
                    echo "$tag"
                  fi
                done \
              | sort -V | tail -n1 || true)
            if [[ -n "${EXISTING_HEAD_RC:-}" ]]; then
              TAG="$EXISTING_HEAD_RC"
              echo "Reusing prerelease tag $TAG at this commit"
            else
              TAG="$(next_rc_tag "$VERSION")"
            fi
            IS_PRE="true"
          else
            TAG="v${VERSION}"
            IS_PRE="false"
          fi

          existing_commit="$(tag_commit "$TAG")"
          if [[ -n "$existing_commit" && "$existing_commit" != "$GITHUB_SHA" ]]; then
            echo "::error::Tag $TAG exists at $existing_commit, not $GITHUB_SHA"
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "version_label=${TAG#v}"
            echo "tag=$TAG"
            echo "is_prerelease=$IS_PRE"
          } >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"        >> "$GITHUB_ENV"

          echo "Computed tag: $TAG (prerelease=$IS_PRE)"

      - name: Build
        shell: bash
        run: make build VERSION_LABEL=${{ steps.compute_tag.outputs.version_label }}

      - name: Rename binary with tag
        shell: bash
        run: |
          mv ./bin/wsstat ./bin/wsstat-${{ steps.compute_tag.outputs.tag }}
          ls -lh ./bin/

      - name: Reconcile release tag (local + remote)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.compute_tag.outputs.tag }}"
          WANT_SHA="${GITHUB_SHA}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Local tag: lets git-cliff resolve the `prev..TAG` range and lets
          # "Find previous final tag" see TAG in `git tag --list`.
          LOCAL_SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
          if [[ -n "$LOCAL_SHA" && "$LOCAL_SHA" != "$WANT_SHA" ]]; then
            echo "::error::Local tag ${TAG} points at ${LOCAL_SHA}, not ${WANT_SHA}"
            exit 1
          fi
          if [[ -z "$LOCAL_SHA" ]]; then
            git tag -a "$TAG" -m "chore(release): $TAG" "$WANT_SHA"
          fi

          # Remote tag via the REST git-refs API, since it must exist before the
          # changelog step for git-cliff's remote lookups.
          REF_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" 2>/dev/null || true)
          if [[ -z "$REF_JSON" ]]; then
            gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${TAG}" \
              -f sha="${WANT_SHA}" >/dev/null
            echo "Created remote tag ${TAG} -> ${WANT_SHA}"
            exit 0
          fi

          HAVE_SHA=$(jq -r '.object.sha' <<<"$REF_JSON")
          HAVE_TYPE=$(jq -r '.object.type' <<<"$REF_JSON")
          while [[ "$HAVE_TYPE" == "tag" ]]; do
            TAG_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${HAVE_SHA}")
            HAVE_SHA=$(jq -r '.object.sha' <<<"$TAG_JSON")
            HAVE_TYPE=$(jq -r '.object.type' <<<"$TAG_JSON")
          done

          if [[ "$HAVE_TYPE" != "commit" ]]; then
            echo "::error::Remote tag ${TAG} points to unsupported object type ${HAVE_TYPE}"
            exit 1
          fi
          if [[ "$HAVE_SHA" != "$WANT_SHA" ]]; then
            echo "::error::Remote tag ${TAG} points at ${HAVE_SHA}, not ${WANT_SHA}"
            exit 1
          fi

          echo "Remote tag ${TAG} already points at ${WANT_SHA}; continuing."

      - name: Find previous final tag (-rc.N excluded)
        id: prev_final
        shell: bash
        run: |
          set -euo pipefail
          PREV=$(git tag --list 'v[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n2 | head -n1 || true)
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate changelog (RC)
        id: git-cliff-rc
        if: ${{ steps.compute_tag.outputs.is_prerelease == 'true' }}
        uses: orhun/git-cliff-action@v4
        with:
          args: --current --tag ${{ steps.compute_tag.outputs.tag }} --no-exec
        env:
          GITHUB_REPO:  ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate changelog (final release)
        id: git-cliff-final
        if: ${{ steps.compute_tag.outputs.is_prerelease == 'false' }}
        uses: orhun/git-cliff-action@v4
        with:
          # If no previous final tag, this produces an empty range; optionally
          # fall back to the root commit if you want *all* history instead.
          args: "--tag ${{ steps.compute_tag.outputs.tag }} ${{ steps.prev_final.outputs.prev }}..${{ steps.compute_tag.outputs.tag }} --no-exec"
        env:
          GITHUB_REPO:  ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:         ${{ steps.compute_tag.outputs.tag }}
          name:             wsstat ${{ steps.compute_tag.outputs.tag }}
          body:             ${{ steps.compute_tag.outputs.is_prerelease == 'true'
                              && steps.git-cliff-rc.outputs.content
                              || steps.git-cliff-final.outputs.content }}
          files:            ./bin/wsstat-${{ steps.compute_tag.outputs.tag }}
          prerelease:       ${{ steps.compute_tag.outputs.is_prerelease }}
          overwrite_files:  true  # rerun resilience
          make_latest:      ${{ steps.compute_tag.outputs.is_prerelease == 'false' }}  # finals only
        env:
          GITHUB_TOKEN: ${{ github.token }}

  snap:
    name: "Build & publish snap to edge"
    needs: [release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # snapcraft.yaml's `git describe --tags` needs full history

      - name: Check out the release tag
        shell: bash
        run: git checkout "${{ needs.release.outputs.tag }}"

      - uses: snapcore/action-build@v1
        id: build

      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge

  summary:
    name: Release summary
    runs-on: ubuntu-24.04
    needs: [initialize, version-bump-check, go-version-align, test-race, test-flaky, golangci-lint, govulncheck, release, snap]
    if: ${{ always() }}  # ensure this job runs even if dependencies failed
    steps:
      - name: Write release summary
        run: |
          {
            echo "## 🚀 Release Summary"
            echo ""
            echo "### Job Status"
            echo "- Initialize:        ${{ needs.initialize.result }}"
            echo "- Version bump:      ${{ needs['version-bump-check'].result }}"
            echo "- Go version align:  ${{ needs['go-version-align'].result }}"
            echo "- Tests (race):      ${{ needs['test-race'].result }}"
            echo "- Tests (flaky):     ${{ needs['test-flaky'].result }}"
            echo "- Lint:              ${{ needs.golangci-lint.result }}"
            echo "- Vuln scan:         ${{ needs.govulncheck.result }}"
            echo "- Release:           ${{ needs.release.result }}"
            echo "- Snap (edge):       ${{ needs.snap.result }}"
            echo ""
            # Only print release details/links if the release job succeeded and produced outputs
            if [ "${{ needs.release.result }}" = "success" ] && [ -n "${{ needs.release.outputs.tag }}" ]; then
              echo "### Release"
              echo "- **Version:** \`${{ needs.release.outputs.version }}\`"
              echo "- **Tag:** \`${{ needs.release.outputs.tag }}\`"
              echo "- **Prerelease:** \`${{ needs.release.outputs.is_prerelease }}\`"
              echo "- **Release page:** [${{ needs.release.outputs.tag }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }})"
            else
              echo "> Release not created (see job statuses above)."
            fi
            echo ""
            echo "Triggered by: @${{ github.actor }}"
            echo "Commit: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
