name: dev-wsstat

services:
  mock-ws:
    build: ./mock-server
    ports:
      - "17080:8080" # ws:// plain
      - "17443:8443" # wss:// TLS (startup-generated self-signed cert)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10
