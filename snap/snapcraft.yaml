name: wsstat
title: wsstat
adopt-info: wsstat
license: MIT
contact: jakob.ersson@proton.me
issues: https://github.com/jkbrsn/wsstat/issues
source-code: https://github.com/jkbrsn/wsstat
website: https://github.com/jkbrsn/wsstat
summary: wsstat - a WebSocket endpoint monitoring tool
description: |
  wsstat provides a simple and easy way to check the connection stats of a WebSocket endpoint.

  Usage: wsstat wss://foo.example.com

grade: stable
confinement: strict
base: core24

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  wsstat:
    command: bin/wsstat
    plugs: [network, home]

parts:
  go-deps:
    plugin: nil
    source: https://go.dev/dl/go1.26.3.linux-amd64.tar.gz
    source-type: tar
    override-build: |
      install -d "${CRAFT_PART_INSTALL}/usr/local/go"
      cp -a "${CRAFT_PART_SRC}/." "${CRAFT_PART_INSTALL}/usr/local/go/"
    stage:
      - usr/local/go/**
    # prime: [] would NOT exclude these files; craft-parts treats an empty
    # include list as "*". Use an exclusion so the Go toolchain stays in the
    # build stage but never ships in the snap.
    prime:
      - -usr

  wsstat:
    plugin: go
    after: [go-deps]
    source: .
    build-packages:
      - git
    build-environment:
      - PATH: "${CRAFT_STAGE}/usr/local/go/bin:${PATH}"
      - GOPROXY: "https://proxy.golang.org,direct"
      - GOSUMDB: "sum.golang.org"
    override-pull: |
      craftctl default
      if git describe --tags --abbrev=7 >/tmp/wsstat.version 2>/dev/null; then
        craftctl set version="$(cat /tmp/wsstat.version)"
      else
        craftctl set version="$(git rev-parse --short HEAD)"
      fi
    override-build: |
      CGO_ENABLED=0 go build -ldflags "-X main.version=$(craftctl get version)" -o "${CRAFT_PART_INSTALL}/bin/wsstat" ./cmd/wsstat
